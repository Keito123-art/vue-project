name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # 1. 下載代碼
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 安裝 Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. 安裝依賴 (修正：刪除 working-directory，直接在根目錄執行)
      - name: Install dependencies
        run: npm install

      # 4. 打包 (修正：刪除 working-directory，直接在根目錄執行)
      - name: Build
        run: npm run build

      # 5. 上傳文件 (修正：路徑直接指向 dist)
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      # 6. 部署
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4