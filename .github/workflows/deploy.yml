name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # 1. 下载代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 安装 Node.js (强制使用 v18)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. 安装依赖 (指定目录)
      - name: Install dependencies
        working-directory: ./vue-project
        run: npm install

      # 4. 打包 (指定目录)
      - name: Build
        working-directory: ./vue-project
        run: npm run build

      # 5. 上传文件 (指定 dist 的路径)
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./vue-project/dist

      # 6. 部署
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
